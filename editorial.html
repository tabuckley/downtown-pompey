<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial | Alternative Archiving</title>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-mode="editorial" data-page="editorial">

    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <canvas id="room-canvas"></canvas>

    <header class="page-topbar">
        <a href="index.html" class="home-link">
            <img src="https://pub-ecb21a155b924fadb12efa79814f20b3.r2.dev/Downtown-Pompey-logo.png" alt="Downtown Pompey — Alternative Archiving" class="home-logo">
        </a>
        <nav class="mode-switcher">
            <a href="editorial.html" class="mode-btn active">Editorial</a>
            <a href="scrapbook.html" class="mode-btn">Scrapbook</a>
            <a href="accessible.html" class="mode-btn">Accessible</a>
        </nav>
    </header>

    <p class="room-hint" id="roomHint">Move to look around · click an object to learn its story</p>

    <details class="room-items-toggle">
        <summary>Browse items in this room</summary>
        <ul id="roomItems"></ul>
    </details>

    <aside class="info-panel" id="infoPanel" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
        <button class="info-close" id="infoClose" aria-label="Close panel">&times;</button>
        <p class="info-kicker" id="infoKicker"></p>
        <h2 class="info-title" id="infoTitle"></h2>
        <p class="info-meta" id="infoMeta"></p>
        <p class="info-desc" id="infoDesc"></p>
        <div class="lb-tags" id="infoTags"></div>
    </aside>

    <div id="site-helper"></div>
    <script type="module" src="helper.js"></script>
    <script type="module" src="editorial.js"></script>
</body>
</html>
